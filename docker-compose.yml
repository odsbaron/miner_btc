services:
  miner-btc-dashboard:
    build:
      context: .
    image: miner-btc:local
    container_name: miner-btc-dashboard
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      MINER_DASHBOARD_ADDR: "0.0.0.0:8080"
      MINER_DEVICE_KIND: "bitaxe"
      MINER_DEVICE_HOST: "127.0.0.1"
      MINER_DEVICE_PORT: "80"
      RUST_LOG: "info"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
